version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: guitar-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: guitar_platform
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./guitar-platform-backend/src/main/resources/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - guitar-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build:
      context: ./guitar-platform-backend
      dockerfile: Dockerfile
    container_name: guitar-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/guitar_platform?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - guitar-network
    volumes:
      - ./uploads:/data/guitar-platform/uploads

  frontend:
    build:
      context: ./guitar-platform-frontend
      dockerfile: Dockerfile
    container_name: guitar-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8080
    depends_on:
      - backend
    networks:
      - guitar-network

volumes:
  mysql_data:

networks:
  guitar-network:
    driver: bridge
