spring:
  datasource:
    url: jdbc:mysql://localhost:3306/guitar_platform?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.guitar.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: guitar-platform-jwt-secret-key-2024-very-long-and-secure
  access-token-expiration: 7200000    # 2 hours in ms
  refresh-token-expiration: 604800000 # 7 days in ms

file:
  upload:
    base-path: /data/guitar-platform/uploads
    base-url: http://localhost:8080/files

server:
  port: 8080

knife4j:
  enable: true
  setting:
    language: zh_cn
